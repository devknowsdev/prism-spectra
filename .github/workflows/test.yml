name: Run AI-Forge Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Run repository doctor
        run: npm run doctor
      - name: Capture strict typecheck
        id: typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck > typecheck.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
      - name: Enforce strict typecheck
        if: steps.typecheck.outputs.exit_code != '0'
        run: |
          cat typecheck.log
          exit 1
      - name: Run production build
        run: npm run build
      - name: Run Ableton staged-adapter tests
        run: npm run test:ableton-adapter
