name: Run AI-Forge Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Run repository doctor
        run: npm run doctor
      - name: Run strict typecheck
        run: npm run typecheck
      - name: Run production build
        run: npm run build
      - name: Run Ableton staged-adapter tests
        run: npm run test:ableton-adapter
