name: Docs Lint

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  docs-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: List markdown files
        shell: bash
        run: |
          set -euo pipefail
          git ls-files '*.md' | while read -r file; do
            test -f "$file" || continue
            echo "ok $file"
          done
